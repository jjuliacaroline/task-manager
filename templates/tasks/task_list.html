<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Task Manager</title>
</head>
<body>
	<h1>Task Manager</h1>
	<p>Simple starter page for demonstrating workflows and tooling.</p>

	<h2>Tasks</h2>
	{% if tasks %}
		<ul>
			{% for task in tasks %}
				<li>
					{{ task.title }}
					{% if task.completed %}(done){% else %}(open){% endif %}
				</li>
			{% endfor %}
		</ul>
	{% else %}
		<p>No tasks yet.</p>
	{% endif %}
</body>
</html>
